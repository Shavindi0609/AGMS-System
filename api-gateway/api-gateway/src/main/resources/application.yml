server:
    port: 8080

spring:
    application:
        name: api-gateway
    config:
      import: "optional:configserver:http://localhost:8888"
    cloud:
        gateway:
            routes:
                - id: zone-service
                  uri: lb://zone-service
                  predicates:
                      - Path=/api/v1/zones/**
                - id: sensor-service
                  uri: lb://sensor-service
                  predicates:
                      - Path=/api/sensors/**
                - id: automation-service
                  uri: lb://automation-service
                  predicates:
                      - Path=/api/automation/**
                - id: crop-service
                  uri: lb://crop-service
                  predicates:
                      - Path=/api/crops/**

eureka:
    client:
        serviceUrl:
            defaultZone: http://localhost:8761/eureka/